<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>设置 — 扑克教练</title>
  <link rel="stylesheet" href="/poker/css/style.css" />
</head>
<body>
  <div class="page">

    <!-- 顶部导航 -->
    <div class="topbar">
      <a href="/poker/" class="btn-icon">←</a>
      <div class="topbar-title" style="font-size:20px;">设置</div>
    </div>

    <div class="scroll-area">

      <!-- 模型选择 -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">AI 模型</span>
        </div>
        <div class="card-body" style="display:flex;flex-direction:column;gap:14px;">
          <div class="form-group">
            <label class="form-label">选择模型</label>
            <select class="form-control" id="modelSelect">
              <option value="qwen3.5-plus">千问 Qwen 3.5 Plus</option>
              <option value="glm-4.6v">智谱 GLM-4.6V</option>
            </select>
          </div>
        </div>
      </div>

      <!-- API Key -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">API Key</span>
        </div>
        <div class="card-body" style="display:flex;flex-direction:column;gap:14px;">

          <div class="form-group">
            <label class="form-label">
              千问 API Key
              <span class="required">*</span>
            </label>
            <input class="form-control" type="password" id="qwenKey"
              placeholder="sk-xxxxxxxxxxxxxxxx" autocomplete="off" />
            <div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-faint);margin-top:4px;text-transform:uppercase;letter-spacing:0.5px;">
              前往 dashscope.aliyun.com 获取
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">智谱 API Key（可选）</label>
            <input class="form-control" type="password" id="zhipuKey"
              placeholder="xxxxxxxxxxxxxxxx" autocomplete="off" />
            <div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-faint);margin-top:4px;text-transform:uppercase;letter-spacing:0.5px;">
              前往 bigmodel.cn 获取
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">
              lingyaai API Key
              <span style="font-family:var(--font-mono);font-size:10px;color:var(--ink-faint);font-weight:normal;">（横向评估用）</span>
            </label>
            <input class="form-control" type="password" id="lingyaaiKey"
              placeholder="sk-xxxxxxxxxxxxxxxx" autocomplete="off" />
            <div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-faint);margin-top:4px;text-transform:uppercase;letter-spacing:0.5px;">
              前往 lingyaai.cn 获取
            </div>
          </div>

        </div>
      </div>

      <!-- 数据管理 -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">数据</span>
        </div>
        <div class="card-body" style="display:flex;flex-direction:column;gap:12px;">
          <div style="font-size:15px;color:var(--ink-soft);font-style:italic;line-height:1.6;">
            手牌记录和分析结果保存在服务器，与本设备的匿名身份绑定。清除本地身份后将无法恢复历史数据。
          </div>
          <button class="btn btn-secondary btn-full btn-sm" onclick="confirmReset()"
            style="border-color:var(--red);color:var(--red);">
            清除本地身份（不可恢复）
          </button>
        </div>
      </div>

      <!-- 保存按钮 -->
      <button class="btn btn-primary btn-full" onclick="saveProfile()">保存设置</button>

      <div style="height:8px;"></div>

    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="/poker/js/types.js"></script>
  <script src="/poker/js/storage.js"></script>
  <script>
    function loadProfile() {
      var settings = getSettings();
      document.getElementById("modelSelect").value = settings.model || DEFAULT_MODEL;
      document.getElementById("qwenKey").value = (settings.apiKeys && settings.apiKeys.qwen) || "";
      document.getElementById("zhipuKey").value = (settings.apiKeys && settings.apiKeys.zhipu) || "";
      document.getElementById("lingyaaiKey").value = (settings.apiKeys && settings.apiKeys.lingyaai) || "";
    }

    function saveProfile() {
      var model = document.getElementById("modelSelect").value;
      var qwenKey = document.getElementById("qwenKey").value.trim();
      var zhipuKey = document.getElementById("zhipuKey").value.trim();
      var lingyaaiKey = document.getElementById("lingyaaiKey").value.trim();

      var settings = getSettings();
      settings.model = model;
      settings.apiKeys = settings.apiKeys || {};
      if (qwenKey) settings.apiKeys.qwen = qwenKey;
      else delete settings.apiKeys.qwen;
      if (zhipuKey) settings.apiKeys.zhipu = zhipuKey;
      else delete settings.apiKeys.zhipu;
      if (lingyaaiKey) settings.apiKeys.lingyaai = lingyaaiKey;
      else delete settings.apiKeys.lingyaai;

      saveSettings(settings);
      showToast("设置已保存");
      setTimeout(function () { window.location.href = "/poker/"; }, 1000);
    }

    function confirmReset() {
      if (!confirm("确定要清除本地身份吗？清除后历史手牌将无法找回。")) return;
      localStorage.removeItem("poker-coach-anon-token");
      localStorage.removeItem("poker-coach-settings");
      showToast("已清除，正在跳转…");
      setTimeout(function () { window.location.href = "/poker/"; }, 1200);
    }

    loadProfile();
  </script>
</body>
</html>
