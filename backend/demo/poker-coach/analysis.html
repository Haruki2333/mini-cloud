<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>分析 — 扑克教练</title>
  <link rel="stylesheet" href="/poker/css/style.css" />
</head>
<body>
  <div class="page" id="page">

    <!-- 顶部导航 -->
    <div class="topbar">
      <a href="/poker/" class="btn-icon" id="backBtn">←</a>
      <span class="topbar-title" id="pageTitle" style="font-size:20px;">手牌复盘</span>
    </div>

    <!-- 内容区 -->
    <div style="flex:1;overflow-y:auto;display:flex;flex-direction:column;" id="mainArea">

      <!-- 手牌概要卡 -->
      <div style="padding:16px;display:flex;flex-direction:column;gap:14px;" id="topSection">

        <div class="card" id="handSummaryCard" style="display:none;">
          <div class="card-header">
            <span class="card-title">手牌信息</span>
          </div>
          <div class="card-body" style="display:flex;flex-direction:column;gap:12px;">

            <!-- 3 格摘要 -->
            <div class="hand-summary" id="handSummaryGrid"></div>

            <!-- 牌面详情（可展开） -->
            <details style="margin:0;">
              <summary style="font-family:var(--font-hand);font-size:16px;color:var(--ink-soft);cursor:pointer;padding:4px 0;font-style:italic;">
                查看完整行动
              </summary>
              <div style="display:flex;flex-direction:column;gap:10px;margin-top:10px;" id="streetDetail"></div>
            </details>

          </div>
        </div>

        <!-- 分析结果区 -->
        <div id="analysisSection"></div>

        <!-- 开始分析按钮 -->
        <div id="analyzeButtonArea" style="display:none;">
          <button class="btn btn-primary btn-full" id="analyzeBtn" onclick="startAnalysis()">
            开始 AI 分析
          </button>
        </div>

        <!-- 横向对比入口 -->
        <div id="compareButtonArea" style="display:none;">
          <a id="compareBtn" href="#" class="btn btn-secondary btn-full"
            style="display:block;text-align:center;text-decoration:none;">
            横向对比多模型 →
          </a>
        </div>

      </div>

      <!-- 聊天分隔线 -->
      <div style="padding:0 16px 12px;display:none;" id="chatDivider">
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="flex:1;border-top:1px dashed var(--ink-line);"></div>
          <span style="font-family:var(--font-hand);font-size:16px;color:var(--ink-faint);font-style:italic;">追问教练</span>
          <div style="flex:1;border-top:1px dashed var(--ink-line);"></div>
        </div>
      </div>

      <!-- 聊天消息区 -->
      <div class="chat-messages" id="chatMessages"></div>

    </div>

    <!-- 聊天输入栏 -->
    <div class="chat-input-bar" id="chatInputBar" style="display:none;">
      <textarea class="chat-input" id="chatInput" placeholder="追问教练…" rows="1"
        onkeydown="handleKey(event)"></textarea>
      <button class="chat-send-btn" id="sendBtn" onclick="sendChat()" title="发送">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>

    <!-- Leak 分析模式内容区 -->
    <div style="flex:1;overflow-y:auto;display:flex;flex-direction:column;" id="leakArea" style="display:none;">
      <div style="padding:16px;display:flex;flex-direction:column;gap:14px;" id="leakTopSection"></div>
      <div class="chat-messages" id="leakChatMessages"></div>
    </div>
    <div class="chat-input-bar" id="leakChatInputBar" style="display:none;">
      <textarea class="chat-input" id="leakChatInput" placeholder="追问教练…" rows="1"
        onkeydown="handleLeakKey(event)"></textarea>
      <button class="chat-send-btn" id="leakSendBtn" onclick="sendLeakChat()" title="发送">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>

  </div>

  <div class="toast" id="toast"></div>
  <script src="/poker/js/types.js"></script>
  <script src="/poker/js/storage.js"></script>
  <script src="/poker/js/analysis.js"></script>
</body>
</html>
