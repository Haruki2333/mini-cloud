<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>录入手牌 — 扑克教练</title>
  <link rel="stylesheet" href="/poker/css/style.css" />
</head>
<body>
  <div class="page page-fixed">

    <!-- 顶部导航 -->
    <div class="topbar">
      <a href="/poker/" class="btn-icon" id="topbarBack">←</a>
      <div class="topbar-title" id="stepTitle" style="font-size:22px;">坐到了哪里？</div>
      <div class="topbar-subtitle" id="stepCounter">1/3</div>
    </div>

    <!-- 步骤进度条 -->
    <div class="wizard-steps" id="wizardSteps">
      <div class="wizard-step active" data-idx="0">局况</div>
      <div class="wizard-step" data-idx="1">起手牌</div>
      <div class="wizard-step" data-idx="2">行动</div>
    </div>

    <!-- 内容区（按步骤切换） -->
    <div class="scroll-area" id="scrollArea">

      <!-- ======= Step 0: 局况 ======= -->
      <div class="wizard-pane" data-pane="0">

        <div class="form-group">
          <label class="form-label">盲注 <span class="required">*</span></label>
          <div class="chip-row" id="blindChips">
            <button type="button" class="chip" data-blind="0.5/1">0.5/1</button>
            <button type="button" class="chip" data-blind="1/2">1/2</button>
            <button type="button" class="chip" data-blind="2/5">2/5</button>
            <button type="button" class="chip" data-blind="5/10">5/10</button>
            <button type="button" class="chip" data-blind="10/25">10/25</button>
            <button type="button" class="chip" data-blind="25/50">25/50</button>
            <button type="button" class="chip" data-blind="__custom__">自定义</button>
          </div>
          <input class="form-control" id="blindCustom" type="text"
            placeholder="如 3/6" style="display:none;margin-top:8px;" />
        </div>

        <div class="form-group" style="margin-top:18px;">
          <label class="form-label">桌型 <span class="required">*</span></label>
          <div class="segmented" id="tableSeg">
            <button type="button" data-table="6max">6-Max</button>
            <button type="button" data-table="9max" class="active">9-Max</button>
            <button type="button" data-table="hu">Heads-Up</button>
          </div>
        </div>

        <div class="form-group" style="margin-top:22px;">
          <label class="form-label">选座 <span class="required">*</span></label>
          <div class="poker-table-wrap">
            <div class="poker-table" id="positionTable"></div>
            <div class="poker-table-center">
              <div class="poker-table-blind" id="centerBlind">—</div>
              <div class="poker-table-type" id="centerType">nine-max</div>
            </div>
          </div>
          <div class="position-hint" id="positionHint">先点圆圈选 Hero，再点其他位置添加对手</div>
        </div>

        <!-- 已入座玩家列表（不含筹码，筹码在下一步录入） -->
        <div class="player-list" id="playerList"></div>

        <div class="form-group" style="margin-top:18px;">
          <label class="form-label">牌局日期</label>
          <input class="form-control" id="playedAt" type="date" />
        </div>

      </div>

      <!-- ======= Step 1: 起手牌 + 筹码 ======= -->
      <div class="wizard-pane" data-pane="1" hidden>

        <div class="form-group" style="text-align:center;">
          <label class="form-label" style="text-align:center;">点击发两张</label>
          <div class="card-slot-row" style="margin-top:8px;">
            <button type="button" class="card-slot" data-target="hero:0">
              <span class="card-slot-placeholder">card 1</span>
            </button>
            <button type="button" class="card-slot" data-target="hero:1">
              <span class="card-slot-placeholder">card 2</span>
            </button>
          </div>
          <button type="button" class="btn-link" id="heroClear" style="margin-top:8px;">清空</button>
        </div>

        <div class="hand-tip" id="handTip"></div>

        <div class="form-section" style="margin-top:20px;">
          <div class="form-section-title">各位筹码</div>
          <div class="player-list" id="stackInputSection"></div>
        </div>

      </div>

      <!-- ======= Step 2: 行动 + 结果 ======= -->
      <div class="wizard-pane" data-pane="2" hidden>

        <div class="street-pane">
          <div class="street-pane-header">
            <span class="street-pane-name">翻前 Preflop <span class="required">*</span></span>
          </div>
          <div class="action-builder" id="preflopBuilder"></div>
        </div>

        <button type="button" class="street-add" data-add="flop">+ 翻牌 Flop</button>
        <div class="street-pane" data-street="flop" hidden>
          <div class="street-pane-header">
            <span class="street-pane-name">翻牌 Flop</span>
            <button type="button" class="street-remove" data-remove="flop">移除</button>
          </div>
          <div class="board-row" id="flopBoard">
            <button type="button" class="card-slot small" data-target="flop:0"><span class="card-slot-placeholder">flop 1</span></button>
            <button type="button" class="card-slot small" data-target="flop:1"><span class="card-slot-placeholder">flop 2</span></button>
            <button type="button" class="card-slot small" data-target="flop:2"><span class="card-slot-placeholder">flop 3</span></button>
          </div>
          <div class="action-builder" id="flopBuilder"></div>
        </div>

        <button type="button" class="street-add" data-add="turn" hidden>+ 转牌 Turn</button>
        <div class="street-pane" data-street="turn" hidden>
          <div class="street-pane-header">
            <span class="street-pane-name">转牌 Turn</span>
            <button type="button" class="street-remove" data-remove="turn">移除</button>
          </div>
          <div class="board-row">
            <button type="button" class="card-slot small" data-target="turn:0"><span class="card-slot-placeholder">turn</span></button>
          </div>
          <div class="action-builder" id="turnBuilder"></div>
        </div>

        <button type="button" class="street-add" data-add="river" hidden>+ 河牌 River</button>
        <div class="street-pane" data-street="river" hidden>
          <div class="street-pane-header">
            <span class="street-pane-name">河牌 River</span>
            <button type="button" class="street-remove" data-remove="river">移除</button>
          </div>
          <div class="board-row">
            <button type="button" class="card-slot small" data-target="river:0"><span class="card-slot-placeholder">river</span></button>
          </div>
          <div class="action-builder" id="riverBuilder"></div>
        </div>

        <!-- 结果区（合并至此步骤） -->
        <div class="street-pane" style="margin-top:4px;">
          <div class="street-pane-header">
            <span class="street-pane-name" style="color:var(--red);">结果</span>
          </div>
          <div style="padding:14px;display:flex;flex-direction:column;gap:14px;">

            <div class="form-group">
              <label class="form-label">赢/输（BB 数）</label>
              <div class="result-stepper">
                <button type="button" class="result-sign" data-sign="-1">−</button>
                <input class="form-control" id="resultBB" type="number" step="0.5" placeholder="0" />
                <button type="button" class="result-sign" data-sign="1">+</button>
              </div>
              <button type="button" class="btn-link" id="autoCalcBtn" style="margin-top:6px;">从行动估算 →</button>
              <div class="form-hint">赢填正数，输填负数</div>
            </div>

            <div class="form-group">
              <label class="form-label">对手底牌（选填）</label>
              <div class="card-slot-row" style="justify-content:flex-start;">
                <button type="button" class="card-slot small" data-target="opp:0"><span class="card-slot-placeholder">card 1</span></button>
                <button type="button" class="card-slot small" data-target="opp:1"><span class="card-slot-placeholder">card 2</span></button>
                <button type="button" class="btn-link" id="oppClear">清空</button>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">对手信息（选填）</label>
              <input class="form-control" id="opponentNotes" type="text"
                placeholder="如：BTN 是激进的 reg，倾向超大注" />
            </div>

            <div class="form-group">
              <label class="form-label">备注（选填）</label>
              <textarea class="form-control" id="notes" rows="3"
                placeholder="记录你的想法或疑惑…"></textarea>
            </div>

          </div>
        </div>

      </div>

    </div>

    <!-- 底部导航 -->
    <div class="wizard-bottombar">
      <button type="button" class="btn btn-secondary" id="prevBtn" disabled>← 上一步</button>
      <button type="button" class="btn btn-primary" id="nextBtn">下一步 →</button>
    </div>

  </div>

  <!-- 选牌器（底部弹层） -->
  <div class="card-picker-mask" id="cardPickerMask" hidden></div>
  <div class="card-picker-sheet" id="cardPickerSheet" hidden>
    <div class="card-picker-header">
      <span id="cardPickerTitle">选张牌</span>
      <button type="button" class="btn-icon" id="cardPickerClose">✕</button>
    </div>
    <div class="card-picker-body">
      <div class="picker-step">① 点数</div>
      <div class="rank-grid" id="rankGrid"></div>
      <div class="picker-step" style="margin-top:14px;">② 花色 <span id="pickedRank" class="picked-rank"></span></div>
      <div class="suit-grid" id="suitGrid">
        <button type="button" data-suit="s" class="black">♠</button>
        <button type="button" data-suit="h" class="red">♥</button>
        <button type="button" data-suit="d" class="red">♦</button>
        <button type="button" data-suit="c" class="black">♣</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="/poker/js/types.js"></script>
  <script src="/poker/js/storage.js"></script>
  <script src="/poker/js/form.js"></script>
</body>
</html>
