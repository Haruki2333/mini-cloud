<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>录入手牌 — 扑克教练</title>
  <link rel="stylesheet" href="/poker/css/style.css" />
</head>
<body>
  <div class="page">

    <!-- 顶部导航 -->
    <div class="topbar">
      <a href="/poker/" class="btn-icon">←</a>
      <span class="topbar-title">录入手牌</span>
    </div>

    <!-- 滚动表单 -->
    <div class="scroll-area">
      <form id="handForm" autocomplete="off">

        <!-- 基本信息 -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">基本信息</span>
          </div>
          <div class="card-body" style="display:flex;flex-direction:column;gap:12px;">

            <div class="form-row">
              <div class="form-group">
                <label class="form-label">盲注 <span class="required">*</span></label>
                <input class="form-control" id="blindLevel" type="text" placeholder="如 1/2、5/10" required />
              </div>
              <div class="form-group">
                <label class="form-label">桌型 <span class="required">*</span></label>
                <select class="form-control" id="tableType" required>
                  <option value="6max">6-Max</option>
                  <option value="9max">9-Max</option>
                  <option value="hu">Heads-Up</option>
                </select>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Hero 位置 <span class="required">*</span></label>
                <select class="form-control" id="heroPosition" required>
                  <!-- 动态填充 -->
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">起手牌 <span class="required">*</span></label>
                <input class="form-control" id="heroCards" type="text" placeholder="如 AsKd / AK s" required />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="form-label">有效筹码 (BB)</label>
                <input class="form-control" id="effectiveStack" type="number" min="1" step="0.5" placeholder="如 100" />
              </div>
              <div class="form-group">
                <label class="form-label">牌局日期</label>
                <input class="form-control" id="playedAt" type="date" />
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">对手信息（选填）</label>
              <input class="form-control" id="opponentNotes" type="text" placeholder="如：BTN 是激进的 reg，倾向超大注" />
            </div>

          </div>
        </div>

        <!-- 翻前 -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">翻前 Preflop <span class="required">*</span></span>
          </div>
          <div class="card-body">
            <div class="form-group">
              <label class="form-label">行动序列</label>
              <textarea class="form-control" id="preflopActions" rows="3"
                placeholder="如：UTG fold，CO raise 3BB，BTN fold，SB fold，BB (Hero) 3bet 9BB，CO call" required></textarea>
              <div style="font-size:12px;color:var(--text-3);margin-top:4px;">
                说明每个玩家的操作，用逗号或换行分隔
              </div>
            </div>
          </div>
        </div>

        <!-- 翻牌（可展开） -->
        <div class="card">
          <div class="card-body" style="padding:0 16px;">
            <button type="button" class="street-toggle" id="flopToggle" aria-expanded="false"
              onclick="toggleStreet('flop')">
              <span class="street-toggle-label">翻牌 Flop（如有）</span>
              <span class="street-toggle-arrow">▼</span>
            </button>
          </div>
          <div class="street-fields" id="flopFields" style="padding:0 16px 16px;">
            <div class="form-group">
              <label class="form-label">公共牌</label>
              <input class="form-control" id="flopCards" type="text" placeholder="如 Ah 7h 2c" />
            </div>
            <div class="form-group">
              <label class="form-label">行动序列</label>
              <textarea class="form-control" id="flopActions" rows="2"
                placeholder="如：BB (Hero) check，CO bet 6BB，BB call"></textarea>
            </div>
          </div>
        </div>

        <!-- 转牌（可展开） -->
        <div class="card">
          <div class="card-body" style="padding:0 16px;">
            <button type="button" class="street-toggle" id="turnToggle" aria-expanded="false"
              onclick="toggleStreet('turn')">
              <span class="street-toggle-label">转牌 Turn（如有）</span>
              <span class="street-toggle-arrow">▼</span>
            </button>
          </div>
          <div class="street-fields" id="turnFields" style="padding:0 16px 16px;">
            <div class="form-group">
              <label class="form-label">转牌</label>
              <input class="form-control" id="turnCard" type="text" placeholder="如 Kd" />
            </div>
            <div class="form-group">
              <label class="form-label">行动序列</label>
              <textarea class="form-control" id="turnActions" rows="2"
                placeholder="如：BB bet 15BB，CO raise 45BB，BB fold"></textarea>
            </div>
          </div>
        </div>

        <!-- 河牌（可展开） -->
        <div class="card">
          <div class="card-body" style="padding:0 16px;">
            <button type="button" class="street-toggle" id="riverToggle" aria-expanded="false"
              onclick="toggleStreet('river')">
              <span class="street-toggle-label">河牌 River（如有）</span>
              <span class="street-toggle-arrow">▼</span>
            </button>
          </div>
          <div class="street-fields" id="riverFields" style="padding:0 16px 16px;">
            <div class="form-group">
              <label class="form-label">河牌</label>
              <input class="form-control" id="riverCard" type="text" placeholder="如 5h" />
            </div>
            <div class="form-group">
              <label class="form-label">行动序列</label>
              <textarea class="form-control" id="riverActions" rows="2"
                placeholder="如：BB check，CO bet 50BB，BB call"></textarea>
            </div>
          </div>
        </div>

        <!-- 结果 -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">结果</span>
          </div>
          <div class="card-body" style="display:flex;flex-direction:column;gap:12px;">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">赢/输（BB 数）</label>
                <input class="form-control" id="resultBB" type="number" step="0.5"
                  placeholder="赢填正数，输填负数" />
              </div>
              <div class="form-group">
                <label class="form-label">对手底牌（选填）</label>
                <input class="form-control" id="showdownOppCards" type="text" placeholder="如 7d7s" />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">备注（选填）</label>
              <textarea class="form-control" id="notes" rows="2"
                placeholder="记录你的想法或疑惑，如：我感觉转牌 raise 是对的但不确定"></textarea>
            </div>
          </div>
        </div>

        <!-- 提交 -->
        <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
          保存并分析
        </button>

        <div style="height:8px;"></div>

      </form>
    </div>

  </div>

  <div class="toast" id="toast"></div>
  <script src="/poker/js/types.js"></script>
  <script src="/poker/js/storage.js"></script>
  <script src="/poker/js/form.js"></script>
</body>
</html>
