<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>冒险游戏</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="page">
    <!-- 顶部栏 -->
    <div class="topbar">
      <div class="signal-indicator">
        <div class="signal-bars">
          <span class="signal-bar"></span>
          <span class="signal-bar"></span>
          <span class="signal-bar"></span>
        </div>
        <span class="signal-status">CONNECTED</span>
      </div>
      <div class="topbar-actions">
        <button class="topbar-btn topbar-btn--alert" id="settingsBtn" title="设置">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- 终端头 -->
    <div class="terminal-header">
      <span class="terminal-dot"></span>
      <span class="terminal-label">ADVENTURE REALM</span>
      <span class="terminal-freq">ADV-01</span>
    </div>

    <!-- 主内容区 -->
    <div class="main-content" id="mainContent">
      <!-- 欢迎面板 -->
      <section class="terminal-panel">
        <div class="terminal-panel-header">
          <span class="terminal-dot"></span>
          WELCOME
        </div>
        <div class="terminal-panel-body">
          <p class="welcome-text">
            欢迎来到<span class="accent">冒险领域</span>。在这里，AI 将为你构建独一无二的互动冒险故事。
            你的每一个选择都将改变故事的走向。准备好踏上未知的旅程了吗？
          </p>
        </div>
      </section>

      <!-- 人物档案面板（有档案时显示） -->
      <div class="char-profile-panel" id="charProfilePanel" style="display: none;">
        <div class="terminal-panel-header">
          <span class="terminal-dot"></span>
          CHARACTER_PROFILE
        </div>
        <div class="char-profile-body">
          <div class="char-profile-row">
            <span class="char-profile-name" id="charProfileName"></span>
            <button class="char-profile-edit-btn" id="charProfileEditBtn">修改档案</button>
          </div>
          <div class="char-profile-tags" id="charProfileTags"></div>
        </div>
      </div>

      <!-- 开始按钮 -->
      <button class="btn-primary" id="startBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        开始新冒险
      </button>

      <!-- 人物初始化按钮 -->
      <button class="btn-secondary btn-character" id="charInitBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        人物初始化
      </button>

      <!-- 继续按钮（有未完成故事时显示） -->
      <button class="btn-secondary" id="continueBtn" style="display: none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        继续未完成的冒险
      </button>

      <!-- 历史故事 -->
      <section class="terminal-panel" style="margin-top: var(--spacing-lg);">
        <div class="terminal-panel-header">
          <span class="terminal-dot"></span>
          STORY_ARCHIVE
        </div>
        <div class="terminal-panel-body">
          <div id="storyList">
            <div class="empty-text">&gt; 暂无历史故事</div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <!-- 设置浮层 -->
  <div class="settings-overlay" id="settingsOverlay">
    <div class="settings-backdrop" id="settingsBackdrop"></div>
    <div class="settings-sheet">
      <div class="settings-header">
        <span class="settings-title">SETTINGS</span>
        <button class="settings-close" id="settingsClose">&times;</button>
      </div>
      <div class="settings-body">
        <div class="form-group">
          <label class="form-label">千问 API Key</label>
          <input class="form-input" id="qwenKeyInput" type="password" placeholder="sk-..." autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label">智谱 API Key</label>
          <input class="form-input" id="zhipuKeyInput" type="password" placeholder="输入智谱 API Key" autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label">AI 模型</label>
          <div class="model-options" id="modelOptions"></div>
        </div>
        <button class="btn-save" id="saveSettingsBtn">保存设置</button>
      </div>
    </div>
  </div>

  <!-- 人物初始化向导弹层 -->
  <div class="settings-overlay" id="charOverlay">
    <div class="settings-backdrop" id="charBackdrop"></div>
    <div class="settings-sheet">
      <div class="settings-header">
        <span class="settings-title">CHARACTER_INIT</span>
        <button class="settings-close" id="charClose">&times;</button>
      </div>
      <div class="settings-body">
        <!-- 进度指示器 -->
        <div class="wizard-progress">
          <div class="wizard-dot active" id="wDot1"></div>
          <div class="wizard-line"></div>
          <div class="wizard-dot" id="wDot2"></div>
          <div class="wizard-line"></div>
          <div class="wizard-dot" id="wDot3"></div>
          <div class="wizard-line"></div>
          <div class="wizard-dot" id="wDot4"></div>
        </div>

        <!-- 第一步：称呼 -->
        <div class="wizard-step active" id="wStep1">
          <p class="wizard-step-num">01 / 04</p>
          <p class="wizard-question">你希望在故事中<br>如何称呼自己？</p>
          <input class="form-input" id="charNameInput" type="text" placeholder="勇者、旅人、星际舰长…" maxlength="20" autocomplete="off">
        </div>

        <!-- 第二步：故事风格（支持多选） -->
        <div class="wizard-step" id="wStep2">
          <p class="wizard-step-num">02 / 04</p>
          <p class="wizard-question">你偏好哪些<br>故事风格？</p>
          <p class="wizard-hint">可多选，AI 会根据你勾选的风格组合生成开局</p>
          <div class="option-grid option-grid--multi" id="genreGrid">
            <button class="option-item" data-value="奇幻冒险">奇幻冒险</button>
            <button class="option-item" data-value="科幻未来">科幻未来</button>
            <button class="option-item" data-value="赛博朋克">赛博朋克</button>
            <button class="option-item" data-value="蒸汽朋克">蒸汽朋克</button>
            <button class="option-item" data-value="末世废土">末世废土</button>
            <button class="option-item" data-value="太空歌剧">太空歌剧</button>
            <button class="option-item" data-value="武侠江湖">武侠江湖</button>
            <button class="option-item" data-value="仙侠修真">仙侠修真</button>
            <button class="option-item" data-value="历史传奇">历史传奇</button>
            <button class="option-item" data-value="现代都市">现代都市</button>
            <button class="option-item" data-value="校园青春">校园青春</button>
            <button class="option-item" data-value="恐怖悬疑">恐怖悬疑</button>
            <button class="option-item" data-value="克苏鲁神话">克苏鲁神话</button>
            <button class="option-item" data-value="推理破案">推理破案</button>
            <button class="option-item" data-value="超能力学院">超能力学院</button>
          </div>
        </div>

        <!-- 第三步：角色类型 -->
        <div class="wizard-step" id="wStep3">
          <p class="wizard-step-num">03 / 04</p>
          <p class="wizard-question">你想扮演<br>什么类型的角色？</p>
          <div class="option-grid" id="roleGrid">
            <button class="option-item" data-value="正义英雄">正义英雄</button>
            <button class="option-item" data-value="神秘智者">神秘智者</button>
            <button class="option-item" data-value="江湖游侠">江湖游侠</button>
            <button class="option-item" data-value="机智骗子">机智骗子</button>
            <button class="option-item" data-value="普通小人物">普通小人物</button>
          </div>
        </div>

        <!-- 第四步：故事基调 -->
        <div class="wizard-step" id="wStep4">
          <p class="wizard-step-num">04 / 04</p>
          <p class="wizard-question">你希望故事的<br>基调是什么？</p>
          <div class="option-grid option-grid--2col" id="toneGrid">
            <button class="option-item" data-value="热血冒险">热血冒险</button>
            <button class="option-item" data-value="轻松幽默">轻松幽默</button>
            <button class="option-item" data-value="严肃深沉">严肃深沉</button>
            <button class="option-item" data-value="温情浪漫">温情浪漫</button>
          </div>
        </div>

        <!-- 导航按钮 -->
        <div class="wizard-nav">
          <button class="btn-secondary wizard-nav-btn" id="wizardPrev" style="display: none;">返回</button>
          <button class="btn-primary wizard-nav-btn" id="wizardNext">下一步</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/types.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
