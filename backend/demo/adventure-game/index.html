<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>冒险游戏</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="page">
    <!-- 顶部栏 -->
    <div class="topbar">
      <div class="signal-indicator">
        <div class="signal-bars">
          <span class="signal-bar"></span>
          <span class="signal-bar"></span>
          <span class="signal-bar"></span>
        </div>
        <span class="signal-status">CONNECTED</span>
      </div>
      <div class="topbar-actions">
        <button class="topbar-btn topbar-btn--alert" id="settingsBtn" title="设置">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- 终端头 -->
    <div class="terminal-header">
      <span class="terminal-dot"></span>
      <span class="terminal-label">ADVENTURE REALM</span>
      <span class="terminal-freq">ADV-01</span>
    </div>

    <!-- 主内容区 -->
    <div class="main-content" id="mainContent">
      <!-- 欢迎面板 -->
      <section class="terminal-panel">
        <div class="terminal-panel-header">
          <span class="terminal-dot"></span>
          WELCOME
        </div>
        <div class="terminal-panel-body">
          <p class="welcome-text">
            欢迎来到<span class="accent">冒险领域</span>。在这里，AI 将为你构建独一无二的互动冒险故事。
            你的每一个选择都将改变故事的走向。准备好踏上未知的旅程了吗？
          </p>
        </div>
      </section>

      <!-- 开始按钮 -->
      <button class="btn-primary" id="startBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        开始新冒险
      </button>

      <!-- 继续按钮（有未完成故事时显示） -->
      <button class="btn-secondary" id="continueBtn" style="display: none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        继续未完成的冒险
      </button>

      <!-- 历史故事 -->
      <section class="terminal-panel" style="margin-top: var(--spacing-lg);">
        <div class="terminal-panel-header">
          <span class="terminal-dot"></span>
          STORY_ARCHIVE
        </div>
        <div class="terminal-panel-body">
          <div id="storyList">
            <div class="empty-text">&gt; 暂无历史故事</div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <!-- 设置浮层 -->
  <div class="settings-overlay" id="settingsOverlay">
    <div class="settings-backdrop" id="settingsBackdrop"></div>
    <div class="settings-sheet">
      <div class="settings-header">
        <span class="settings-title">SETTINGS</span>
        <button class="settings-close" id="settingsClose">&times;</button>
      </div>
      <div class="settings-body">
        <div class="form-group">
          <label class="form-label">千问 API Key</label>
          <input class="form-input" id="qwenKeyInput" type="password" placeholder="sk-..." autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label">智谱 API Key</label>
          <input class="form-input" id="zhipuKeyInput" type="password" placeholder="输入智谱 API Key" autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label">AI 模型</label>
          <div class="model-options" id="modelOptions"></div>
        </div>
        <button class="btn-save" id="saveSettingsBtn">保存设置</button>
      </div>
    </div>
  </div>

  <script src="js/types.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
