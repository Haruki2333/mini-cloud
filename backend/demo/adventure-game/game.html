<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>冒险进行中</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="page">
    <!-- 背景图层 -->
    <div class="game-bg" id="gameBg"></div>
    <div class="game-bg-overlay"></div>

    <!-- 场景图生成角标 -->
    <div class="image-loading-badge" id="imageBadge">
      <div class="image-badge-spinner"></div>
      <span class="image-badge-text" id="imageBadgeText">画境生成中...</span>
    </div>

    <!-- 导航 -->
    <div class="game-nav">
      <a href="index.html" class="nav-back" id="navBack">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </a>
      <span class="nav-title" id="navTitle">故事模式</span>
      <span class="nav-progress" id="navProgress"></span>
    </div>

    <!-- 进度条 -->
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
    </div>

    <!-- 本局目标条（选定世界观后显示） -->
    <div class="goal-banner" id="goalBanner" style="display: none;">
      <div class="goal-banner-label">使命</div>
      <div class="goal-banner-text" id="goalBannerText"></div>
    </div>

    <!-- 属性面板（选定世界观后显示） -->
    <div class="stats-panel" id="statsPanel" style="display: none;">
      <div class="stats-level-row">
        <span class="stats-realm-label" id="statsRealmLabel">初入江湖</span>
        <div class="stats-exp-bar">
          <div class="stats-exp-fill" id="statsExpFill"></div>
        </div>
        <span class="stats-exp-text" id="statsExpText">0/100</span>
      </div>
      <div class="stats-attrs-row" id="statsAttrsRow">
        <span class="stat-item"><span class="stat-label">力量</span><span class="stat-val" id="sv-strength">3</span></span>
        <span class="stat-item"><span class="stat-label">速度</span><span class="stat-val" id="sv-speed">3</span></span>
        <span class="stat-item"><span class="stat-label">内力</span><span class="stat-val" id="sv-neili">3</span></span>
        <span class="stat-item"><span class="stat-label">轻功</span><span class="stat-val" id="sv-qinggong">3</span></span>
        <span class="stat-item"><span class="stat-label">防御</span><span class="stat-val" id="sv-defense">3</span></span>
        <span class="stat-item"><span class="stat-label">智谋</span><span class="stat-val" id="sv-wisdom">3</span></span>
      </div>
    </div>

    <!-- 游戏内容 -->
    <div class="game-content" id="gameContent">
      <!-- 场景历史 -->
      <div class="scene-history" id="sceneHistory"></div>

      <!-- 当前场景 -->
      <div class="scene-current" id="sceneCurrent">
        <div class="scene-narrative" id="sceneNarrative"></div>
      </div>

      <!-- 结局面板 -->
      <div class="ending-panel" id="endingPanel" style="display: none;">
        <div class="ending-title">故事终章</div>
        <div class="ending-narrative" id="endingNarrative"></div>
        <a href="index.html" class="btn-home">归去来兮</a>
      </div>
    </div>

    <!-- 世界观选择区（仅第一轮显示按钮） -->
    <div class="choices-area" id="choicesArea"></div>

    <!-- 自由行动输入区（世界观确定后显示） -->
    <div class="action-input-area" id="actionInputArea" style="display: none;">
      <div class="inspiration-chips" id="inspirationChips"></div>
      <div class="action-input-row">
        <textarea
          id="actionInput"
          class="action-input"
          rows="1"
          placeholder="你想做什么？（Shift+Enter 换行）"
          maxlength="300"
        ></textarea>
        <button id="actionSend" class="action-send" type="button">
          <span class="action-send-label">发送</span>
          <span class="action-send-spinner" id="actionSendSpinner"></span>
        </button>
      </div>
    </div>
  </main>

  <!-- 前世记忆觉醒覆盖层 -->
  <div class="awakening-overlay" id="awakeningOverlay">
    <div class="awakening-content">
      <div class="awakening-title">前世记忆</div>
      <div class="awakening-fragments" id="awakeningFragments"></div>
      <div class="awakening-hint">记忆融入灵魂，属性已觉醒</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- 加载浮层 -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-panel">
      <div class="loading-spinner"></div>
      <div class="loading-text" id="loadingText">运笔中</div>
      <div class="loading-sub" id="loadingSub">正在构建故事世界...</div>
    </div>
  </div>

  <script src="js/types.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
