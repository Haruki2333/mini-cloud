<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>光明生活助理</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="chat-page">
    <!-- 顶部栏 -->
    <div class="chat-topbar">
      <div class="signal-indicator">
        <div class="signal-bars">
          <span class="signal-bar"></span>
          <span class="signal-bar"></span>
          <span class="signal-bar"></span>
        </div>
        <span class="signal-status">CONNECTED</span>
      </div>
      <a href="profile.html" class="profile-link" id="profileLink">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span class="profile-badge" id="profileBadge"></span>
      </a>
    </div>

    <!-- 终端头 -->
    <div class="terminal-header">
      <span class="terminal-dot"></span>
      <span class="terminal-label">LUMINA ASSISTANT</span>
      <span class="terminal-freq">CH-07</span>
    </div>

    <!-- 聊天消息区 -->
    <div class="chat-container">
      <div class="chat-messages" id="chatMessages"></div>
    </div>

    <!-- 底部输入区 -->
    <div class="chat-bottom">
      <div class="input-bar">
        <button class="mic-btn-small" id="micBtn" type="button" title="语音输入">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
        <input class="chat-input" id="chatInput" type="text" placeholder="输入消息..." autocomplete="off">
        <button class="send-btn" id="sendBtn" type="button" title="发送">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="mic-hint" id="micHint" style="display:none">&gt; <span>录音中，再次点击结束</span></div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="js/types.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/asr.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
