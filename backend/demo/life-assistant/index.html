<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>光明生活助理</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="home-page">
    <!-- 顶部栏 -->
    <div class="chat-topbar">
      <div class="signal-indicator">
        <div class="signal-bars">
          <span class="signal-bar"></span>
          <span class="signal-bar"></span>
          <span class="signal-bar"></span>
        </div>
        <span class="signal-status">CONNECTED</span>
      </div>
      <div class="topbar-links">
        <a href="profile.html" class="profile-link" id="profileLink">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <span class="profile-badge" id="profileBadge"></span>
        </a>
      </div>
    </div>

    <!-- 终端头 -->
    <div class="terminal-header">
      <span class="terminal-dot"></span>
      <span class="terminal-label">LUMINA ASSISTANT</span>
      <span class="terminal-freq">CH-07</span>
    </div>

    <!-- 可滚动主体 -->
    <div class="home-content" id="homeContent">

      <!-- AI 回复卡片 -->
      <section class="terminal-panel" id="assistantPanel">
        <div class="terminal-panel-header">
          <span class="terminal-dot"></span>
          ASSISTANT_REPLY
        </div>
        <div class="terminal-panel-body">
          <div id="thinkingArea"></div>
          <div id="assistantReply" class="assistant-reply"></div>
        </div>
      </section>

      <!-- 日期选择 -->
      <div class="date-picker-row">
        <label>DATE&gt;</label>
        <input type="date" class="date-picker" id="dateInput">
      </div>

      <!-- 每日摘要 + 记录详情 -->
      <section class="terminal-panel">
        <div class="terminal-panel-header">
          <span class="terminal-dot"></span>
          DAILY_SUMMARY
        </div>
        <div class="terminal-panel-body">
          <div class="summary-grid" id="summaryPanel">
            <div class="summary-item summary-item--clickable" data-type="expense">
              <div class="summary-value" id="totalExpense">¥0</div>
              <div class="summary-label">总支出</div>
            </div>
            <div class="summary-item summary-item--clickable" data-type="food">
              <div class="summary-value" id="totalFood">0</div>
              <div class="summary-label">食物记录</div>
            </div>
            <div class="summary-item summary-item--clickable" data-type="todo">
              <div class="summary-value" id="totalTodo">0</div>
              <div class="summary-label">待办事项</div>
            </div>
            <div class="summary-item summary-item--clickable" data-type="insight">
              <div class="summary-value" id="totalInsight">0</div>
              <div class="summary-label">感悟</div>
            </div>
          </div>
          <!-- 展开的记录列表 -->
          <div class="summary-detail" id="summaryDetail"></div>
        </div>
      </section>

    </div>

    <!-- 固定底部输入栏 -->
    <div class="home-input-bar">
      <div class="input-bar">
        <button class="mic-btn-small" id="micBtn" type="button" title="语音输入">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
        <input class="chat-input" id="chatInput" type="text" placeholder="输入消息..." autocomplete="off">
        <button class="send-btn" id="sendBtn" type="button" title="发送">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="mic-hint" id="micHint" style="display:none">&gt; <span>录音中，再次点击结束</span></div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="js/types.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/asr.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
