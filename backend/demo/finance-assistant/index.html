<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>光明财务助理</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="home-page">
    <!-- 顶部栏 -->
    <div class="chat-topbar">
      <div class="signal-indicator">
        <div class="signal-bars">
          <span class="signal-bar"></span>
          <span class="signal-bar"></span>
          <span class="signal-bar"></span>
        </div>
        <span class="signal-status">CONNECTED</span>
      </div>
      <div class="topbar-links">
        <a href="profile.html" class="profile-link" id="profileLink">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <span class="profile-badge" id="profileBadge"></span>
        </a>
      </div>
    </div>

    <!-- 终端头 -->
    <div class="terminal-header">
      <span class="terminal-dot"></span>
      <span class="terminal-label">FINANCE ASSISTANT</span>
      <span class="terminal-freq">FIN-01</span>
    </div>

    <!-- 可滚动主体 -->
    <div class="home-content" id="homeContent">

      <!-- 月份选择 -->
      <div class="date-picker-row">
        <label>MONTH&gt;</label>
        <input type="month" class="date-picker" id="dateInput">
      </div>

      <!-- 每月财务摘要 -->
      <section class="terminal-panel">
        <div class="terminal-panel-header">
          <span class="terminal-dot"></span>
          MONTHLY_SUMMARY
        </div>
        <div class="terminal-panel-body">
          <div class="summary-grid summary-grid--3col" id="summaryPanel">
            <div class="summary-item summary-item--clickable" data-type="expense">
              <div class="summary-value" id="totalExpense">¥0</div>
              <div class="summary-label">总支出</div>
            </div>
            <div class="summary-item summary-item--clickable" data-type="income">
              <div class="summary-value" id="totalIncome">¥0</div>
              <div class="summary-label">总收入</div>
            </div>
            <div class="summary-item summary-item--muted">
              <div class="summary-value summary-value--muted" id="netIncome">¥0</div>
              <div class="summary-label">净收支</div>
            </div>
          </div>
        </div>
      </section>

      <!-- 流水明细卡片 -->
      <section class="terminal-panel" id="transactionPanel">
        <div class="terminal-panel-header">
          <span class="terminal-dot"></span>
          RECENT_TRANSACTIONS
        </div>
        <div class="terminal-panel-body">
          <div id="transactionList" class="transaction-list">
            <div class="record-empty">&gt; 暂无记录</div>
          </div>
        </div>
      </section>

    </div>
  </main>

  <div class="toast" id="toast"></div>

  <!-- 悬浮记账按钮 -->
  <button class="fab-btn" id="fabBtn" title="记账 / 提问">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
    </svg>
  </button>

  <!-- 输入浮层 -->
  <div class="input-overlay" id="inputOverlay">
    <div class="input-overlay-backdrop" id="inputOverlayBackdrop"></div>
    <div class="input-overlay-sheet">
      <div class="input-overlay-header">
        <span class="input-overlay-title">RECORD &gt;</span>
        <button class="input-overlay-close" id="inputOverlayClose">✕</button>
      </div>
      <div class="input-overlay-body">
        <input class="chat-input" id="chatInput" type="text" placeholder="记一笔账、查收支..." autocomplete="off">
        <button class="send-btn" id="sendBtn" type="button" title="发送">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- AI 思考浮层 -->
  <div class="thinking-overlay" id="thinkingOverlay">
    <div class="thinking-overlay-panel">
      <div class="thinking-drag-handle"></div>
      <div class="thinking-overlay-header">
        <div class="thinking-status-dot" id="thinkingStatusDot"></div>
        <span class="thinking-overlay-title">AI_PROCESSING</span>
      </div>
      <div class="thinking-user-echo" id="thinkingUserEcho"></div>
      <div class="thinking-overlay-body">
        <div id="thinkingArea"></div>
      </div>
    </div>
  </div>

  <script src="js/types.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
