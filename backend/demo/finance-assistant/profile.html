<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>个人资料 - 光明财务助理</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="profile-page">
    <!-- 导航 -->
    <nav class="terminal-nav">
      <a href="index.html">&larr;</a>
      <span class="nav-title">PROFILE_CONFIG</span>
    </nav>

    <!-- 个人资料 -->
    <section class="terminal-panel">
      <div class="terminal-panel-header">
        <span class="terminal-dot"></span>
        PERSONAL_INFO
      </div>
      <div class="terminal-panel-body">
        <div class="form-group">
          <label class="form-label">称呼</label>
          <input type="text" class="form-input" id="profileName" placeholder="你希望助理怎么称呼你">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">年龄</label>
            <input type="number" class="form-input" id="profileAge" placeholder="可选">
          </div>
          <div class="form-group">
            <label class="form-label">性别</label>
            <input type="text" class="form-input" id="profileGender" placeholder="可选">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">爱好</label>
          <input type="text" class="form-input" id="profileHobbies" placeholder="如：阅读、跑步、做饭">
        </div>
        <div class="form-group">
          <label class="form-label">个人简介</label>
          <textarea class="form-input" id="profileBio" rows="2" placeholder="让助理更了解你（可选）"></textarea>
        </div>
      </div>
    </section>

    <!-- API 配置 -->
    <section class="terminal-panel">
      <div class="terminal-panel-header">
        <span class="terminal-dot"></span>
        API_CREDENTIALS
      </div>
      <div class="terminal-panel-body">
        <div class="form-group">
          <label class="form-label">千问 API Key（必填）</label>
          <input type="password" class="form-input" id="apiKeyQwen" placeholder="sk-...">
        </div>
        <div class="form-group">
          <label class="form-label">智谱 API Key（可选）</label>
          <input type="password" class="form-input" id="apiKeyZhipu" placeholder="如需使用 GLM 模型">
        </div>
      </div>
    </section>

    <!-- 模型选择 -->
    <section class="terminal-panel">
      <div class="terminal-panel-header">
        <span class="terminal-dot"></span>
        AI_MODEL
      </div>
      <div class="terminal-panel-body">
        <div class="model-group" id="modelGroup"></div>
      </div>
    </section>

    <!-- 操作按钮 -->
    <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 8px;">
      <button class="btn-primary" id="saveBtn">保存设置</button>
      <button class="btn-danger-outline" id="clearChatBtn">清除聊天记录</button>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="js/types.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
