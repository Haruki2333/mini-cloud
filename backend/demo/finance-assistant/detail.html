<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>收支详情 - 光明财务助理</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="detail-page">
    <!-- 导航 -->
    <nav class="terminal-nav">
      <a href="index.html">&larr;</a>
      <span class="nav-title" id="pageTitle">EXPENSE_RECORDS</span>
    </nav>

    <!-- 月份选择 -->
    <div class="date-picker-row">
      <label>MONTH&gt;</label>
      <input type="month" class="date-picker" id="monthInput">
    </div>

    <!-- 搜索框 -->
    <div class="search-row">
      <label>SEARCH&gt;</label>
      <input type="text" class="search-input" id="searchInput" placeholder="输入关键词过滤..." autocomplete="off">
    </div>

    <!-- 月度汇总 -->
    <section class="terminal-panel">
      <div class="terminal-panel-header">
        <span class="terminal-dot"></span>
        MONTHLY_TOTAL
      </div>
      <div class="terminal-panel-body">
        <div class="detail-summary">
          <span class="detail-summary-amount" id="totalAmount">¥0</span>
          <span class="detail-summary-count" id="totalCount">0 条记录</span>
        </div>
      </div>
    </section>

    <!-- 记录列表 -->
    <section class="terminal-panel">
      <div class="terminal-panel-header">
        <span class="terminal-dot"></span>
        <span id="listTitle">RECORD_LIST</span>
      </div>
      <div class="terminal-panel-body" id="recordList">
        <div class="record-empty">&gt; 暂无记录</div>
      </div>
    </section>
  </main>

  <script src="js/types.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/detail.js"></script>
</body>
</html>
