<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>新增记录 - 食物记录</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <button class="header-back" onclick="history.back()">&#8592; 返回</button>
    <span class="header-title">新增记录</span>
    <div class="header-spacer"></div>
  </header>

  <main class="content">
    <div class="form-group">
      <!-- fileInput 置于 uploadArea 外部，避免 innerHTML 重置时丢失事件绑定 -->
      <input type="file" accept="image/*" capture="environment" id="fileInput" style="display:none">
      <div class="upload-area" id="uploadArea">
        <div class="upload-placeholder" id="uploadPlaceholder">
          <span class="upload-icon">&#128247;</span>
          <span class="upload-text">点击拍照或选择图片</span>
        </div>
        <img class="upload-preview" id="uploadPreview" alt="已选择的食物照片" style="display:none">
      </div>
    </div>

    <div id="aiStatus" style="display:none"></div>

    <div class="form-group">
      <label class="form-label" for="nameInput">菜名</label>
      <input id="nameInput" placeholder="输入菜名">
    </div>

    <div class="form-group">
      <label class="form-label">食材</label>
      <div class="tag-input-container" id="ingredientsContainer"></div>
    </div>

    <div class="form-group">
      <label class="form-label" for="cookingMethodInput">烹饪方式</label>
      <input id="cookingMethodInput" placeholder="如：红烧、清蒸、爆炒">
    </div>

    <div class="form-group">
      <label class="form-label">标签</label>
      <div class="tag-input-container" id="tagsContainer"></div>
    </div>

    <div class="form-group" id="descriptionGroup" style="display:none">
      <label class="form-label">AI 描述</label>
      <div class="detail-description" id="descriptionText"></div>
    </div>

    <button class="btn btn-primary" id="saveBtn" disabled>保存记录</button>
  </main>

  <script src="js/types.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/add.js"></script>
</body>
</html>
