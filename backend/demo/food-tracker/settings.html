<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>设置 - 食物记录</title>
  <link rel="stylesheet" href="/design-tokens/base.css">
  <link rel="stylesheet" href="/design-tokens/themes/food-tracker.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <button class="header-back" onclick="history.back()">&#8592; 返回</button>
    <span class="header-title">设置</span>
    <div style="width:48px"></div>
  </header>

  <main class="content">
    <div class="settings-section">
      <h2 class="settings-section-title">识别模型</h2>
      <p style="font-size:13px;color:var(--color-text-muted);margin-bottom:16px">
        选择用于食物识别的 AI 模型
      </p>
      <div class="tier-switch" id="modelSwitch" style="flex-wrap:wrap;gap:6px"></div>
    </div>

    <div class="settings-section">
      <h2 class="settings-section-title">API Key 配置</h2>
      <p style="font-size:13px;color:var(--color-text-muted);margin-bottom:16px">
        API Key 仅存储在本地浏览器中，不会上传到服务器
      </p>

      <div class="settings-item">
        <label class="settings-item-label">智谱 API Key（GLM-4V 系列）</label>
        <input type="password" id="zhipuKey" placeholder="输入智谱 API Key">
      </div>

      <div class="settings-item">
        <label class="settings-item-label">千问 API Key（Qwen 系列 · DashScope）</label>
        <input type="password" id="qwenKey" placeholder="输入千问 DashScope API Key">
      </div>
    </div>

    <button class="btn btn-primary" id="saveBtn">保存设置</button>
  </main>

  <script src="js/types.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/settings.js"></script>
</body>
</html>
