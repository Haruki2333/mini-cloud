<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>食物记录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="home-content">
    <!-- 信号状态指示器 -->
    <div class="signal-indicator">
      <div class="signal-bars">
        <span class="signal-bar"></span>
        <span class="signal-bar"></span>
        <span class="signal-bar"></span>
      </div>
      <span class="signal-status">CONNECTED</span>
      <span class="signal-freq" id="signalFreq">47.3 kHz</span>
    </div>

    <!-- 终端对话框 -->
    <div class="terminal-chat">
      <div class="glow-overlay"></div>
      <div class="terminal-header">
        <span class="terminal-dot"></span>
        <span class="terminal-label">LUMINA TERMINAL</span>
        <span class="terminal-freq" id="terminalFreq">CH-07</span>
      </div>
      <div class="terminal-messages" id="terminalMessages"></div>
      <div class="terminal-input-line">
        <span class="prompt-char">&gt;</span>
        <span>awaiting input</span>
        <span class="blink-dot"></span>
      </div>
    </div>

    <!-- 终端操作选项 -->
    <div class="terminal-actions">
      <button class="terminal-action-btn" id="cameraBtn">
        <span class="action-index">[01]</span>
        <span class="action-content">
          <span class="action-cmd">CAPTURE_SCAN</span>
          <span class="action-label">拍照识别</span>
        </span>
        <span class="action-arrow">&#x25B6;</span>
      </button>
      <button class="terminal-action-btn" id="albumBtn">
        <span class="action-index">[02]</span>
        <span class="action-content">
          <span class="action-cmd">LOAD_IMAGE</span>
          <span class="action-label">从相册选择</span>
        </span>
        <span class="action-arrow">&#x25B6;</span>
      </button>
      <a href="records.html" class="terminal-action-btn">
        <span class="action-index">[03]</span>
        <span class="action-content">
          <span class="action-cmd">VIEW_HISTORY</span>
          <span class="action-label">历史记录</span>
        </span>
        <span class="action-arrow">&#x25B6;</span>
      </a>
      <a href="settings.html" class="terminal-action-btn">
        <span class="action-index">[04]</span>
        <span class="action-content">
          <span class="action-cmd">SYSTEM_CONFIG</span>
          <span class="action-label">系统设置</span>
        </span>
        <span class="action-arrow">&#x25B6;</span>
      </a>
    </div>

    <!-- 隐藏的文件输入 -->
    <input type="file" accept="image/*" capture="environment" id="cameraInput" style="display:none">
    <input type="file" accept="image/*" id="albumInput" style="display:none">
  </main>

  <!-- 识别中遮罩 -->
  <div class="home-loading-overlay" id="loadingOverlay">
    <div class="home-loading-box">
      <div class="signal-ring"></div>
      <div class="loading-progress">
        <div class="loading-progress-bar" id="loadingProgressBar"></div>
      </div>
      <p class="loading-text" id="loadingText">INITIALIZING SCAN...</p>
      <p class="loading-text-main" id="loadingTextMain">正在解析食物信息</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/exif-js@2.3.0/exif.min.js"></script>
  <script src="js/types.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
